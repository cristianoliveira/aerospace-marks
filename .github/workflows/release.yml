name: Release Go Binaries

on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: macos-latest
    strategy:
      matrix:
        goos: [darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build binary
        env:
          CGO_ENABLED: 1
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build \
            -ldflags="-s -w -X github.com/cristianoliveira/aerospace-marks/cmd.VERSION=${{ github.event.release.tag_name }}" \
            -o aerospace-marks \
            ./

      - name: Package artifacts
        run: |
          tar -czf "aerospace-marks-${{ github.event.release.tag_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" \
            aerospace-marks LICENSE README.md

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: aerospace-marks-*.tar.gz

  nix-release:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate new hashes
        run: |
          version="${{ github.event.release.tag_name }}"
          sed -i 's#version = ".*";#version = "'"$version"'";#' nix/package-default.nix
          sed -i 's#VERSION =.*#VERSION = "'"$version"'"#' cmd/root.go
          bash scripts/update-nix-hash.sh nix/package-default.nix ".#default"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: bump version to ${{ inputs.version }}"
          branch: bump-version-${{ inputs.version }}
          title: "chore: bump version to ${{ inputs.version }}"
          body: |
            This PR bumps the version to ${{ inputs.version }} and updates the necessary hashes.
